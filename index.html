<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WC 2026 Predictions League</title>
  <link rel="stylesheet" href="style.css" />
  <script defer src="app.js"></script>
</head>
<body>
  <header class="hero">
    <div class="hero-copy">
      <p class="eyebrow">World Cup 2026</p>
      <h1>Predictions League</h1>
      <p class="subtitle">Live βαθμολογία, αποτελέσματα και προβλέψεις παικτών από Google Sheets.</p>
    </div>
    <button id="refreshBtn">Ανανέωση</button>
  </header>

  <main>
    <section id="status" class="status">Φόρτωση δεδομένων…</section>

    <section id="summaryCards" class="cards"></section>

    <section class="podium" id="podium"></section>

    <section class="panel">
      <div class="panel-title">
        <h2>Βαθμολογία</h2>
        <input id="playerSearch" placeholder="Αναζήτηση παίκτη…" />
      </div>
      <div class="table-wrap">
        <table id="leaderboardTable"></table>
      </div>
    </section>

    <section class="panel">
      <div class="panel-title">
        <h2>Αποτελέσματα αγώνων</h2>
        <select id="groupFilter"><option value="">Όλοι οι όμιλοι</option></select>
      </div>
      <div class="table-wrap">
        <table id="matchesTable"></table>
      </div>
    </section>

    <section class="panel">
      <div class="panel-title">
        <h2>Προβλέψεις παίκτη</h2>
        <select id="playerSelect"></select>
      </div>
      <div id="playerBox" class="player-box">Διάλεξε παίκτη για να δεις τις προβλέψεις του.</div>
    </section>
  </main>
</body>
</html>
